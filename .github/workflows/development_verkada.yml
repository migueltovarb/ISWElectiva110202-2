name: Build and deploy Python app to Azure Web App - verkada

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
        working-directory: backend-verkada

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend-verkada

      # Opcional: Agrega aquí los comandos de prueba (pytest, etc.)

      - name: Zip artifact for deployment
        run: zip -r release.zip ./*
        working-directory: backend-verkada

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend-verkada/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DAFC48C10B784DE78671B143FB4B9A0D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0FB0222A633440D0961BB053B70AF53D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5014DEE7CE6B4AE28BE85654BCB9E680 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'verkada'
          slot-name: 'Production'
